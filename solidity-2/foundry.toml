[profile.default]
src = "src"
out = "out"
libs = ["lib"]

remappings = [
    '@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/',
    "@forge-std/=lib/forge-std/",
    "@openzeppelin/contracts=lib/openzeppelin-contracts/contracts",
    '@prb/math/=lib/prb-math/src/',
    '@velodrome-finance/slipstream/=lib/slipstream/contracts/',
    '@velodrome-finance/pool-launcher/=lib/pool-launcher/src',
]
evm_version = "shanghai"

[invariant]
runs = 256
depth = 64

fail_on_revert = true